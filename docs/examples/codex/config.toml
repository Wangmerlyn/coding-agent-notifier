model = "<YOUR_CODEX_MODEL_ID>"
model_reasoning_effort = "high"

[shell_environment_policy.set]
SLACK_BOT_TOKEN = "xoxb-your-token-here"
SLACK_USER_ID = "U12345678"
# For Feishu/Lark custom bot notifications, set one of:
# LARK_WEBHOOK_URL = "https://open.larksuite.com/open-apis/bot/v2/hook/your-token-here"
# FEISHU_WEBHOOK_URL = "https://open.feishu.cn/open-apis/bot/v2/hook/your-token-here"

# Optional:
# DEBUG_CODEX_PAYLOAD = "/tmp/codex_payload.json"   # capture payload used
# ENV_FILE = "/path/to/.env"                        # local env-file fallback

# Put hook commands in ~/.codex/hooks.json; see docs/examples/codex/hooks.json.
# For deterministic Feishu/Lark hooks, prefer a user-level env file loaded by
# lark_notify.py with --env-file; see docs/examples/codex/hooks_lark.json.
